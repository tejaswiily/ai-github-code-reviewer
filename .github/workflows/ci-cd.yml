name: ReviewAgent CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Lint and Verify Backend Python Code
  backend-lint-test:
    name: Backend CI Pipeline
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential libpq-dev

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install black flake8 pytest httpx

    - name: Check Formatting with Black
      run: |
        black --check backend/app --line-length 120

    - name: Lint Code with Flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  # Job 2: Verify Frontend Node Code & Compilation
  frontend-build-check:
    name: Frontend CI Pipeline
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Node.js 18
      uses: actions/setup-node@v3
      with:
        node-size: 18
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Node Dependencies
      run: |
        cd frontend
        npm ci || npm install

    - name: Validate Production Build
      run: |
        cd frontend
        npm run build

  # Job 3: Verify Docker Integration Setup
  docker-compose-validate:
    name: Docker Integration Pipeline
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Validate Docker Compose Configuration
      run: |
        docker compose config
